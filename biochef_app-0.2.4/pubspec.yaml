name: biochef_app
description: "BioChef AI - Il tuo chef intelligente di famiglia."
publish_to: 'none'

# Aggiornato a 0.2.4 per permettere l'update sul telefono
version: 0.2.3+22

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.1
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.0

  intl: ^0.20.2
  package_info_plus: ^9.0.1
  google_fonts: ^6.2.1
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  share_plus: ^10.1.3
  ota_update: ^7.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# Configurazione Icona App (Root level)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icona_app.png"
  adaptive_icon_background: "#1B4332"
  adaptive_icon_foreground: "assets/icona_app.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icona_app.png
