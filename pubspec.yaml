name: biochef_app
description: "BioChef AI - Il tuo chef intelligente di famiglia."
publish_to: 'none'


version: 0.3.8+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^12.0.1
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.3.0

  intl: ^0.20.2
  package_info_plus: ^8.1.1
  google_fonts: ^8.0.2
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  share_plus: ^12.0.0
  ota_update: ^7.1.0
  url_launcher: ^6.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Configurazione Icona App (Root level)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icona_app.png"
  adaptive_icon_background: "#1B4332"
  adaptive_icon_foreground: "assets/icona_app.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icona_app.png
